<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Boss Challenge</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
    </head>
    <body class="bg-light d-flex align-items-center min-vh-100">
        <main class="container">
            <section class="row justify-content-center">
                <div class="col-12 col-md-6">
                    <article class="card shadow-sm">
                        <div class="ratio ratio-16x9">
                            <img
                                class="card-img-top img-fluid object-fit-cover"
                                src="https://m.media-amazon.com/images/I/61weYiKOGJL._AC_SL1500_.jpg"
                                alt="Imagen del producto: Lápiz gigante"
                            />
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">Lápiz Gigante</h5>
                            <p class="card-text">
                                Lorem ipsum dolor sit amet, consectetur
                                adipisicing elit.
                            </p>
                            <p class="h4 text-success">$126.99</p>
                            <button
                                type="button"
                                class="btn btn-primary me-2"
                                data-bs-toggle="tooltip"
                                title="Proceed to checkout"
                            >
                                Buy now
                            </button>
                            <button
                                type="button"
                                class="btn btn-outline-secondary"
                            >
                                Save for later
                            </button>
                        </div>
                    </article>
                </div>
            </section>
        </main>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
        <script>
            // Activate tooltip manually
            var tooltipTriggerList = [].slice.call(
                document.querySelectorAll('[data-bs-toggle="tooltip"]'),
            );
            tooltipTriggerList.map(function (tooltipTriggerEl) {
                return new bootstrap.Tooltip(tooltipTriggerEl);
            });
        </script>
    </body>
</html>
